<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FNaF & Läskiga Spel</title>
    <style>
        /* Cool animerad skräck-bakgrund */
        body {
            background: radial-gradient(circle, #1a0000 0%, #050000 70%, #000000 100%);
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            animation: tvFlicker 0.3s infinite alternate;
        }

        /* Subtilt flimmer för gammal TV-skärmskänsla */
        @keyframes tvFlicker {
            0% { opacity: 0.98; }
            100% { opacity: 1; }
        }

        h1 {
            font-size: 3.5rem;
            color: #ffffff;
            text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000, 0 0 30px #000;
            letter-spacing: 4px;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        /* Spelbehållare */
        .game-container {
            max-width: 900px;
            margin: 30px auto;
            background: rgba(15, 15, 15, 0.95);
            padding: 25px;
            border: 3px solid #ff0000;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            position: relative;
        }

        /* Statisk brus-effekt över speltiteln */
        h2 {
            color: #fff;
            font-size: 1.8rem;
            letter-spacing: 1px;
            margin-top: 0;
            text-shadow: 2px 2px #ff0000;
        }

        .description {
            color: #bbb;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        /* Inbäddningen av spelet */
        iframe {
            width: 100%;
            height: 550px;
            border: 4px solid #111;
            background: #000;
            box-shadow: inset 0 0 20px #000;
        }

        footer {
            margin-top: 60px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <h1>BEVAKNINGSCENTRALEN</h1>
    <div class="subtitle">Överlev natten. Klicka på spelen för att starta.</div>

    <!-- FIVE NIGHTS AT FREDDY'S -->
    <div class="game-container">
        <h2>[LIVE-FEED] Five Nights at Freddy's</h2>
        <p class="description">Använd kamerorna och spara på strömmen. Håll koll på Freddy och hans vänner.</p>
        <!-- Inbäddat FNaF-spel (HTML5-version) -->
        <iframe src="https://gamaverse.com" frameborder="0" scrolling="no" allowfullscreen></iframe>
    </div>

    <!-- SLENDRINA (Från förra versionen) -->
    <div class="game-container">
        <h2>[KAMERA 02] Slendrina Must Die</h2>
        <p class="description">Hitta de 8 böckerna i det övergivna huset.</p>
        <iframe src="https://gamaverse.com" frameborder="0" scrolling="no" allowfullscreen></iframe>
    </div>

    <footer>
        <p>SYSTEMSTATUS: ONLINE // STRÖM: 99%</p>
    </footer>

</body>
</html>
